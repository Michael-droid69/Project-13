<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Project 13 Leaderboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      background-color: black;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    .heading-box {
      background: linear-gradient(to right, orange, gold);
      padding: 20px;
      color: black;
      font-size: 26px;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(255, 165, 0, 0.4);
    }

    .wave-container {
      line-height: 0;
    }

    .wave-container svg {
      display: block;
      width: 100%;
      height: auto;
      background: black;
    }

    table {
      margin: 40px auto;
      border-collapse: collapse;
      background-color: rgba(255, 255, 255, 0.05);
      transition: all 0.3s ease-in-out;
    }

    th, td {
      border: 2px solid orange;
      padding: 12px 24px;
      font-size: 18px;
      transition: transform 0.2s ease;
    }

    td:hover {
      transform: scale(1.16);
      cursor: pointer;
    }

    th {
      background-color: rgba(255, 165, 0, 0.2);
      color: white;
      font-weight: bold;
    }

    td {
      color: white;
    }

    th i {
      color: white;
      font-size: 14px;
      margin-right: 8px;
    }

    footer {
      margin-top: 50px;
    }

    .popup-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      backdrop-filter: blur(5px);
      background-color: rgba(0, 0, 0, 0.6);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    .popup {
      background: #111;
      padding: 30px;
      border: 2px solid orange;
      border-radius: 12px;
      text-align: center;
      color: white;
      max-width: 90%;
      width: 300px;
    }

    .popup h2 {
      font-size: 26px;
      margin-bottom: 10px;
      color: orange;
    }

    .popup p {
      font-size: 18px;
      margin: 6px 0;
    }

    .close-btn {
      margin-top: 15px;
      padding: 6px 14px;
      background: orange;
      color: black;
      border: none;
      font-weight: bold;
      cursor: pointer;
      border-radius: 6px;
    }
    .back-home-btn {
  display: inline-block;
  margin: 20px auto 50px;
  padding: 10px 20px;
  background-color: orange;
  color: black;
  font-weight: bold;
  text-decoration: none;
  border-radius: 8px;
  box-shadow: 0 4px 8px rgba(255, 165, 0, 0.3);
  transition: transform 0.2s ease, background-color 0.2s ease;
}

.back-home-btn:hover {
  background-color: gold;
  transform: scale(1.05);
}

  </style>
</head>
<body>

  
  <div class="heading-box">
    <h1>🏆 Welcome to the Leaderboards 🏆</h1>
  </div>

  <div class="wave-container">
    <svg viewBox="0 0 1440 150" xmlns="http://www.w3.org/2000/svg">
      <path fill="orange" fill-opacity="1" d="M0,32L80,37.3C160,43,320,53,480,69.3C640,85,800,107,960,117.3C1120,128,1280,128,1360,128L1440,128L1440,0L1360,0C1280,0,1120,0,960,0C800,0,640,0,480,0C320,0,160,0,80,0L0,0Z"></path>
    </svg>
  </div>

  <table>
    <thead>
      <tr>
        <th><i class="fas fa-user"></i>Username</th>
        <th><i class="fas fa-lightbulb"></i>Lights Collected</th>
        <th><i class="fas fa-bullseye"></i>Score</th>
      </tr>
    </thead>
    <tbody id="leaderboard-body">
    </tbody>
  </table>

  <div class="popup-overlay" id="popup-overlay">
    <div class="popup" id="popup">
      <h2 id="popup-username">Player Name</h2>
      <p id="popup-lights">Lights: 0</p>
      <p id="popup-score">Score: 0</p>
      <button class="close-btn" onclick="closePopup()">Close</button>
    </div>
  </div>
  <button onclick="syncScores()" style="
  display: inline-block;
  margin: 10px auto;
  padding: 10px 20px;
  background-color: #222;
  color: orange;
  font-weight: bold;
  border: 1px solid orange;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
">🔄 Sync Story Mode Scores</button>
  <a href="index.html" class="back-home-btn">← Back to Home</a>

  <footer>
    <div class="wave-container">
      <svg viewBox="0 0 1440 150" xmlns="http://www.w3.org/2000/svg" style="transform: rotate(180deg);">
        <path fill="orange" fill-opacity="1" d="M0,32L80,37.3C160,43,320,53,480,69.3C640,85,800,107,960,117.3C1120,128,1280,128,1360,128L1440,128L1440,0L1360,0C1280,0,1120,0,960,0C800,0,640,0,480,0C320,0,160,0,80,0L0,0Z"></path>
      </svg>
    </div>
  </footer>

  <script>
    function syncScores() {
      fetch('/sync-scores')
    .then(r => r.json())
    .then(d => {
      alert('Scores synced! Reloading leaderboard...');
      location.reload();
    })
    .catch(() => alert('Could not sync. Is the server running?'));
}
    function showPopup(player) {
      document.getElementById('popup-username').textContent = player.username;
      document.getElementById('popup-lights').textContent = "Lights Collected: " + player.lights;
      document.getElementById('popup-score').textContent = "Score: " + player.score;
      document.getElementById('popup-overlay').style.display = 'flex';
    }

    function closePopup() {
      document.getElementById('popup-overlay').style.display = 'none';
    }

 fetch('/leaderboard')
  .then(response => response.json())
  .then(data => {
    const tbody = document.getElementById('leaderboard-body');
    const scores = data.scores || data;
    scores.forEach(player => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${player.username}</td>
            <td>${player.lights}</td>
            <td>${player.score}</td>
          `;
          row.onclick = () => showPopup(player);
          tbody.appendChild(row);
        });
      })
      .catch(error => {
        console.error('Error loading leaderboard:', error);
      });
  
  </script>

</body>
</html>
